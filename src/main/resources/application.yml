server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: board-game-server
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/boardgame}
    username: ${DATABASE_USER:boardgame}
    password: ${DATABASE_PASSWORD:boardgame}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

apple:
  # iOS bundle id — must match the `aud` claim in Apple ID tokens.
  bundle-id: ${APPLE_BUNDLE_ID:com.sanchitb.boardgame.app}

auth:
  jwt:
    # Sign our session JWTs. Override in prod — never ship the default.
    secret: ${BOARD_GAME_JWT_SECRET:dev-only-secret-change-me-at-least-32-bytes-please}
    ttl-hours: ${BOARD_GAME_JWT_TTL_HOURS:720}

logging:
  level:
    org.hibernate.SQL: info
    com.sanchitb.boardgame: info
