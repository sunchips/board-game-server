server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: board-game-server
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/boardgame}
    username: ${DATABASE_USER:boardgame}
    password: ${DATABASE_PASSWORD:boardgame}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

api:
  key: ${BOARD_GAME_API_KEY:dev-key}

auth:
  # HMAC secret for signing our own session JWTs. MUST be overridden in prod via env.
  jwt-secret: ${AUTH_JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
  # 30 days
  jwt-ttl-seconds: ${AUTH_JWT_TTL_SECONDS:2592000}
  jwt-issuer: ${AUTH_JWT_ISSUER:board-game-server}
  apple:
    # Bundle ID of the iOS app — must match the `aud` claim of the identity token.
    client-id: ${APPLE_CLIENT_ID:com.sanchitb.boardgamerecorder}
    issuer: ${APPLE_ISSUER:https://appleid.apple.com}
    jwks-url: ${APPLE_JWKS_URL:https://appleid.apple.com/auth/keys}

logging:
  level:
    org.hibernate.SQL: info
    com.sanchitb.boardgame: info
