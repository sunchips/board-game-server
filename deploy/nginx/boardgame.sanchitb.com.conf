# Canonical nginx vhost for boardgame.sanchitb.com.
# Modelled on /opt/benchpress/deploy/_template/nginx.conf.tmpl.
#
# Install on the server:
#   sudo cp deploy/nginx/boardgame.sanchitb.com.conf /etc/nginx/sites-available/boardgame.sanchitb.com
#   sudo ln -sf /etc/nginx/sites-available/boardgame.sanchitb.com /etc/nginx/sites-enabled/boardgame.sanchitb.com
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name boardgame.sanchitb.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name boardgame.sanchitb.com;

    # Wildcard cert already covers *.sanchitb.com — no certbot expansion needed.
    ssl_certificate /etc/letsencrypt/live/sanchitb.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sanchitb.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    include /opt/benchpress/deploy/_template/nginx-security-headers.conf;
    include /opt/benchpress/deploy/_template/nginx-compression.conf;

    # Game records are tiny JSON. 1 MiB is generous; tighten if abuse appears.
    client_max_body_size 1M;

    # GitHub webhook receiver — board-game-webhook.service listens on 9001.
    # GitHub posts here on every push to main; the receiver validates the
    # HMAC against /home/sanchit/apps/board-game/etc/webhook-secret and
    # fires deploy.sh in the background.
    location = /webhook/github {
        proxy_pass http://127.0.0.1:9001/hooks/deploy;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
        proxy_connect_timeout 3s;
    }

    location / {
        proxy_pass http://127.0.0.1:28080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
